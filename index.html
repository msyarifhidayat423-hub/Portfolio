    <style>
        /* Mengatur container utama hero agar relatif */
        .hero-container {
            position: relative;
            width: 100%;
            height: 100vh; /* Full layar */
            background: linear-gradient(135deg, #0d6efd 0%, #001a4d 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mengatur kanvas partikel agar absolut di belakang */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1; /* Di belakang konten */
        }

        /* Mengatur konten agar berada di atas partikel */
        .hero-content {
            position: relative;
            z-index: 2; /* Di depan partikel */
            color: white;
            text-align: center;
        }

        /* Memastikan Navigasi tetap di atas */
        .navbar {
            z-index: 10;
        }
    </style>
</head>

<div class="hero-container">
    <div id="particles-js"></div>

    <div class="hero-content container">
        <h1 class="display-3 fw-bold">Halo, Saya Syarif</h1>
        <p class="lead">Informatics Engineering Student | IT Infrastructure & Software Developer</p>
        <hr class="my-4 border-light w-25 mx-auto">
        <p>Spesialis dalam Flutter, AppSheet, IoT, dan Maintenance Hardware.</p>
        <a href="projects.html" class="btn btn-light btn-lg px-5 mt-3 shadow">Lihat Portofolio</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
    particlesJS("particles-js", {
        "particles": {
            "number": {
                "value": 80, /* Jumlah partikel */
                "density": {
                    "enable": true,
                    "value_area": 800
                }
            },
            "color": {
                "value": "#ffffff" /* Warna partikel (putih) */
            },
            "shape": {
                "type": "circle", /* Bentuk bulat */
            },
            "opacity": {
                "value": 0.5,
                "random": false,
            },
            "size": {
                "value": 3,
                "random": true,
            },
            "line_linked": {
                "enable": true, /* Aktifkan garis penghubung */
                "distance": 150,
                "color": "#ffffff",
                "opacity": 0.4,
                "width": 1
            },
            "move": {
                "enable": true,
                "speed": 2, /* Kecepatan gerak */
                "direction": "none",
                "random": false,
                "straight": false,
                "out_mode": "out",
                "bounce": false,
            }
        },
        "interactivity": {
            "detect_on": "canvas",
            "events": {
                "onhover": {
                    "enable": true, /* Efek saat kursor menempel */
                    "mode": "grab" /* Garis akan menempel ke kursor */
                },
                "onclick": {
                    "enable": true,
                    "mode": "push" /* Menambah partikel saat diklik */
                },
                "resize": true
            },
        },
        "retina_detect": true
    });
</script>

</body>
